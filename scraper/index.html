<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scraper · Domaines Mariage 77</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ─── Variables ─────────────────────────── */
    :root {
      --wine:       #6B2737;
      --wine-deep:  #4A1825;
      --olive:      #6B7A3E;
      --olive-lt:   #8FA055;
      --gold:       #C9A96E;
      --cream:      #F8F3E9;
      --bg:         #F2EDE3;
      --bg-card:    #FDFAF5;
      --text:       #1E1410;
      --text-mid:   #5C3D35;
      --text-muted: #9A8070;
      --border:     rgba(107,39,55,0.12);
      --border-hov: rgba(107,39,55,0.28);
      --sh:         rgba(44,24,16,0.10);
      --sh-md:      rgba(44,24,16,0.18);
      --green:      #3d7a52;
      --orange:     #b85c2a;
      --blue:       #2a6b9e;
      --radius:     6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ─── Layout ────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ─── Header ────────────────────────────── */
    .header {
      background: var(--wine-deep);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.3rem;
      color: var(--cream);
      letter-spacing: 1px;
    }
    .header-badge {
      background: var(--gold);
      color: var(--wine-deep);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .header-link {
      color: rgba(248,243,233,0.55);
      font-size: 0.75rem;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color .2s;
    }
    .header-link:hover { color: var(--gold); }

    /* ─── Stats Bar ─────────────────────────── */
    .stats-bar {
      background: var(--wine);
      padding: .6rem 2rem;
      display: flex;
      gap: 2.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .stat { display: flex; align-items: center; gap: .5rem; }
    .stat-num {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--cream);
    }
    .stat-lbl {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(248,243,233,0.6);
    }
    .stat-sep { width: 1px; height: 24px; background: rgba(248,243,233,0.15); }

    /* ─── Body Layout ───────────────────────── */
    .body { display: flex; flex: 1; }

    /* ─── Sidebar ───────────────────────────── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1.2rem;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    .filter-group { margin-bottom: 1.4rem; }
    .filter-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: .5rem;
      display: block;
    }
    .filter-input {
      width: 100%;
      padding: .5rem .7rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .filter-input:focus { border-color: var(--wine); }
    .range-row { display: flex; gap: .4rem; align-items: center; }
    .range-sep { font-size: .75rem; color: var(--text-muted); flex-shrink: 0; }
    .filter-check-list { display: flex; flex-direction: column; gap: .4rem; }
    .check-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      cursor: pointer;
      font-size: .78rem;
      color: var(--text-mid);
      user-select: none;
    }
    .check-item input[type="checkbox"] { accent-color: var(--wine); width: 14px; height: 14px; }
    .btn-reset {
      width: 100%;
      padding: .55rem;
      background: transparent;
      border: 1px solid var(--border-hov);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-mid);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background .2s, color .2s;
    }
    .btn-reset:hover { background: var(--wine); color: var(--cream); border-color: var(--wine); }

    /* ─── Main ──────────────────────────────── */
    .main { flex: 1; padding: 1.5rem 2rem; min-width: 0; }

    /* toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: .8rem;
    }
    .results-count { font-size: .82rem; color: var(--text-muted); }
    .results-count strong { color: var(--wine); font-weight: 600; }
    .sort-row { display: flex; align-items: center; gap: .6rem; }
    .sort-lbl { font-size: .72rem; color: var(--text-muted); }
    .sort-select {
      padding: .4rem .7rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
    }

    /* card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow .25s, border-color .25s, transform .25s;
      cursor: pointer;
      position: relative;
    }
    .card:hover {
      box-shadow: 0 6px 24px var(--sh-md);
      border-color: var(--border-hov);
      transform: translateY(-2px);
    }
    .card.favorited { border-color: var(--gold); }

    .card-top {
      background: linear-gradient(135deg, var(--wine-deep) 0%, var(--wine) 100%);
      padding: 1.1rem 1.2rem .9rem;
      position: relative;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--cream);
      margin-bottom: .2rem;
      line-height: 1.3;
    }
    .card-ville {
      font-size: .7rem;
      color: rgba(248,243,233,.6);
      letter-spacing: 1px;
    }
    .card-note {
      position: absolute;
      top: .9rem;
      right: 1rem;
      background: rgba(0,0,0,.25);
      color: var(--gold);
      font-size: .75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: .5px;
    }
    .card-fav {
      position: absolute;
      bottom: .7rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      opacity: .4;
      transition: opacity .2s, transform .2s;
      line-height: 1;
    }
    .card-fav:hover, .card.favorited .card-fav { opacity: 1; transform: scale(1.15); }

    .card-body { padding: 1rem 1.2rem; }

    .card-kpis {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .4rem;
      margin-bottom: .9rem;
    }
    .kpi {
      background: var(--bg);
      border-radius: 4px;
      padding: .4rem .5rem;
      text-align: center;
    }
    .kpi-val {
      font-size: .82rem;
      font-weight: 700;
      color: var(--wine);
      display: block;
      line-height: 1.2;
    }
    .kpi-lbl {
      font-size: .58rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-bottom: .9rem;
    }
    .badge {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid transparent;
    }
    .badge-green  { background: #e6f4ed; color: var(--green); border-color: #b8ddc9; }
    .badge-olive  { background: #eef2e3; color: var(--olive); border-color: #c8d49a; }
    .badge-orange { background: #fdeee5; color: var(--orange); border-color: #f0c4a8; }
    .badge-wine   { background: #f4e8ea; color: var(--wine); border-color: #d9a8b0; }
    .badge-blue   { background: #e5eff8; color: var(--blue); border-color: #a8c8e8; }
    .badge-gray   { background: #f0ede8; color: var(--text-muted); border-color: #d8d0c8; }

    .card-desc {
      font-size: .75rem;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: .9rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: .8rem;
      border-top: 1px solid var(--border);
    }
    .card-contact {
      font-size: .7rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: .1rem;
    }
    .card-contact a { color: var(--wine); text-decoration: none; }
    .card-contact a:hover { text-decoration: underline; }
    .btn-site {
      padding: .4rem .9rem;
      background: var(--wine);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      transition: background .2s;
      flex-shrink: 0;
    }
    .btn-site:hover { background: var(--wine-deep); }

    /* ─── Modal ─────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,14,8,.65);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-card);
      max-width: 680px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      border-radius: var(--radius);
      transform: translateY(16px) scale(.97);
      transition: transform .25s;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .modal-overlay.open .modal { transform: none; }
    .modal-header {
      background: linear-gradient(135deg, var(--wine-deep), var(--wine));
      padding: 1.5rem 1.8rem;
      position: relative;
    }
    .modal-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-style: italic;
      color: var(--cream);
      margin-bottom: .2rem;
    }
    .modal-ville { font-size: .78rem; color: rgba(248,243,233,.65); letter-spacing: 1px; }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: rgba(255,255,255,.1);
      border: none;
      color: var(--cream);
      font-size: 1.1rem;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover { background: rgba(255,255,255,.2); }
    .modal-body { padding: 1.8rem; }
    .modal-kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .6rem;
      margin-bottom: 1.4rem;
    }
    .modal-kpi {
      background: var(--bg);
      padding: .7rem;
      border-radius: var(--radius);
      text-align: center;
    }
    .modal-kpi .kpi-val { font-size: 1rem; }
    .modal-section { margin-bottom: 1.4rem; }
    .modal-section-title {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .7rem;
      padding-bottom: .35rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-desc {
      font-size: .85rem;
      color: var(--text-mid);
      line-height: 1.75;
    }
    .modal-points { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
    .modal-points li {
      display: flex;
      align-items: flex-start;
      gap: .5rem;
      font-size: .82rem;
      color: var(--text-mid);
    }
    .modal-points li::before {
      content: '✦';
      color: var(--gold);
      font-size: .55rem;
      margin-top: .25rem;
      flex-shrink: 0;
    }
    .modal-badges { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .8rem; }
    .modal-contact-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: .8rem;
    }
    .modal-contact-item { font-size: .78rem; color: var(--text-mid); }
    .modal-contact-item a { color: var(--wine); }
    .btn-visit {
      display: inline-block;
      margin-top: .4rem;
      padding: .65rem 1.6rem;
      background: var(--wine);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      transition: background .2s;
    }
    .btn-visit:hover { background: var(--wine-deep); }

    /* ─── Empty state ───────────────────────── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty h3 { font-family: 'Playfair Display', serif; color: var(--wine); margin-bottom: .4rem; font-style: italic; }
    .empty p { font-size: .85rem; }

    /* ─── Favorites strip ───────────────────── */
    .fav-strip {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: .7rem 2rem;
      display: none;
      align-items: center;
      gap: 1rem;
      font-size: .78rem;
      color: var(--text-mid);
    }
    .fav-strip.visible { display: flex; }
    .fav-strip strong { color: var(--wine); }

    /* ─── Responsive ────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .stats-bar { gap: 1rem; }
      .main { padding: 1rem; }
      .modal-kpis { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-logo">Domaines · 77</span>
      <span class="header-badge">Scraper</span>
    </div>
    <a href="http://localhost:3000" class="header-link" target="_blank">→ Site invités</a>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="stat-num" id="st-total">—</span><span class="stat-lbl">Domaines</span></div>
    <div class="stat-sep"></div>
    <div class="stat"><span class="stat-num" id="st-price">—</span><span class="stat-lbl">Prix moy.</span></div>
    <div class="stat-sep"></div>
    <div class="stat"><span class="stat-num" id="st-cap">—</span><span class="stat-lbl">Capacité moy.</span></div>
    <div class="stat-sep"></div>
    <div class="stat"><span class="stat-num" id="st-foret">—</span><span class="stat-lbl">Avec forêt</span></div>
    <div class="stat-sep"></div>
    <div class="stat"><span class="stat-num" id="st-heberg">—</span><span class="stat-lbl">Avec héberg.</span></div>
    <div class="stat-sep"></div>
    <div class="stat"><span class="stat-num" id="st-best">—</span><span class="stat-lbl">Meilleure note</span></div>
  </div>

  <!-- Favorites strip -->
  <div class="fav-strip" id="fav-strip">
    ⭐ <strong id="fav-count">0</strong> domaine(s) en favori — <span id="fav-names"></span>
  </div>

  <div class="body">
    <!-- Sidebar -->
    <aside class="sidebar">
      <p class="sidebar-title">Filtres</p>

      <div class="filter-group">
        <label class="filter-label">Recherche</label>
        <input class="filter-input" type="text" id="f-search" placeholder="Nom ou ville…" />
      </div>

      <div class="filter-group">
        <label class="filter-label">Budget (€)</label>
        <div class="range-row">
          <input class="filter-input" type="number" id="f-prix-min" placeholder="Min" />
          <span class="range-sep">–</span>
          <input class="filter-input" type="number" id="f-prix-max" placeholder="Max" />
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Distance de Paris (km max)</label>
        <input class="filter-input" type="number" id="f-dist" placeholder="Ex: 60" />
      </div>

      <div class="filter-group">
        <label class="filter-label">Capacité (invités min)</label>
        <input class="filter-input" type="number" id="f-cap" placeholder="Ex: 150" />
      </div>

      <div class="filter-group">
        <label class="filter-label">Traiteur</label>
        <select class="filter-input" id="f-traiteur">
          <option value="">Tous</option>
          <option value="inclus">Inclus</option>
          <option value="externe">Externe (libre)</option>
          <option value="les deux">Au choix</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Critères</label>
        <div class="filter-check-list">
          <label class="check-item"><input type="checkbox" id="f-foret" /> 🌲 Forêt / bois</label>
          <label class="check-item"><input type="checkbox" id="f-heberg" /> 🏨 Hébergement sur place</label>
          <label class="check-item"><input type="checkbox" id="f-fav-only" /> ⭐ Favoris uniquement</label>
        </div>
      </div>

      <button class="btn-reset" id="btn-reset">Réinitialiser</button>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="toolbar">
        <p class="results-count" id="results-count"></p>
        <div class="sort-row">
          <span class="sort-lbl">Trier par :</span>
          <select class="sort-select" id="sort-by">
            <option value="note">Note</option>
            <option value="prix_asc">Prix ↑</option>
            <option value="prix_desc">Prix ↓</option>
            <option value="distance">Distance</option>
            <option value="capacite">Capacité</option>
            <option value="nom">Nom A–Z</option>
          </select>
        </div>
      </div>

      <div class="grid" id="grid"></div>
    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-name" id="m-name"></h2>
      <p class="modal-ville" id="m-ville"></p>
      <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-kpis">
        <div class="modal-kpi"><span class="kpi-val" id="m-prix"></span><span class="kpi-lbl">Budget</span></div>
        <div class="modal-kpi"><span class="kpi-val" id="m-cap"></span><span class="kpi-lbl">Invités max</span></div>
        <div class="modal-kpi"><span class="kpi-val" id="m-dist"></span><span class="kpi-lbl">Km Paris</span></div>
        <div class="modal-kpi"><span class="kpi-val" id="m-note"></span><span class="kpi-lbl">Note</span></div>
      </div>
      <div class="modal-section">
        <p class="modal-section-title">Caractéristiques</p>
        <div class="modal-badges" id="m-badges"></div>
      </div>
      <div class="modal-section">
        <p class="modal-section-title">Description</p>
        <p class="modal-desc" id="m-desc"></p>
      </div>
      <div class="modal-section">
        <p class="modal-section-title">Points forts</p>
        <ul class="modal-points" id="m-points"></ul>
      </div>
      <div class="modal-section">
        <p class="modal-section-title">Contact & site</p>
        <div class="modal-contact-row" id="m-contact"></div>
        <a id="m-link" href="#" target="_blank" class="btn-visit">Visiter le site →</a>
      </div>
    </div>
  </div>
</div>

<script>
  let ALL = [];
  let favs = new Set(JSON.parse(localStorage.getItem('scraper_favs') || '[]'));
  let activeIdx = null;

  /* ─── Helpers ─────────────────────────── */
  const fmtPrice = (v) => v ? `${(v/1000).toFixed(1)}k€` : '—';
  const fmtNote  = (v) => v || '—';

  function noteScore(n) {
    if (!n) return 0;
    return parseFloat(n.replace('/5', '')) || 0;
  }

  function traiteurBadge(t) {
    if (t === 'inclus')    return `<span class="badge badge-green">Traiteur inclus</span>`;
    if (t === 'externe')   return `<span class="badge badge-blue">Traiteur libre</span>`;
    if (t === 'les deux')  return `<span class="badge badge-olive">Traiteur au choix</span>`;
    return '';
  }

  /* ─── Stats ───────────────────────────── */
  function updateGlobalStats() {
    const n = ALL.length;
    const avgPrice = ALL.reduce((s, d) => s + (d.prix_min + d.prix_max) / 2, 0) / n;
    const avgCap   = Math.round(ALL.reduce((s, d) => s + d.capacite_max, 0) / n);
    const withForet = ALL.filter(d => d.a_bois_foret).length;
    const withHeb   = ALL.filter(d => d.a_hebergement).length;
    const best      = ALL.reduce((b, d) => noteScore(d.note) > noteScore(b.note) ? d : b, ALL[0]);

    document.getElementById('st-total').textContent  = n;
    document.getElementById('st-price').textContent  = fmtPrice(Math.round(avgPrice));
    document.getElementById('st-cap').textContent    = avgCap + ' pers';
    document.getElementById('st-foret').textContent  = withForet + '/' + n;
    document.getElementById('st-heberg').textContent = withHeb + '/' + n;
    document.getElementById('st-best').textContent   = best?.note || '—';
  }

  /* ─── Favorites strip ─────────────────── */
  function updateFavStrip() {
    const strip = document.getElementById('fav-strip');
    if (favs.size === 0) { strip.classList.remove('visible'); return; }
    strip.classList.add('visible');
    document.getElementById('fav-count').textContent = favs.size;
    const names = ALL.filter((_,i) => favs.has(i)).map(d => d.nom.split(' ').slice(0,2).join(' '));
    document.getElementById('fav-names').textContent = names.join(' · ');
  }

  function saveFavs() {
    localStorage.setItem('scraper_favs', JSON.stringify([...favs]));
    updateFavStrip();
    renderGrid();
  }

  /* ─── Filters & Sort ──────────────────── */
  function getFilters() {
    return {
      search:    document.getElementById('f-search').value.trim().toLowerCase(),
      prixMin:   parseFloat(document.getElementById('f-prix-min').value) || 0,
      prixMax:   parseFloat(document.getElementById('f-prix-max').value) || Infinity,
      dist:      parseFloat(document.getElementById('f-dist').value) || Infinity,
      cap:       parseFloat(document.getElementById('f-cap').value) || 0,
      traiteur:  document.getElementById('f-traiteur').value,
      foret:     document.getElementById('f-foret').checked,
      heberg:    document.getElementById('f-heberg').checked,
      favOnly:   document.getElementById('f-fav-only').checked,
    };
  }

  function applyFilters() {
    const f = getFilters();
    return ALL.map((d, i) => ({ d, i })).filter(({ d, i }) => {
      if (f.search && !d.nom.toLowerCase().includes(f.search) && !d.ville.toLowerCase().includes(f.search)) return false;
      if (d.prix_min < f.prixMin || d.prix_min > f.prixMax) return false;
      if (d.distance_paris_km > f.dist) return false;
      if (d.capacite_max < f.cap) return false;
      if (f.traiteur && d.traiteur !== f.traiteur) return false;
      if (f.foret  && !d.a_bois_foret)   return false;
      if (f.heberg && !d.a_hebergement)  return false;
      if (f.favOnly && !favs.has(i))     return false;
      return true;
    });
  }

  function sortItems(items) {
    const by = document.getElementById('sort-by').value;
    return items.sort((a, b) => {
      const da = a.d, db = b.d;
      if (by === 'note')      return noteScore(db.note) - noteScore(da.note);
      if (by === 'prix_asc')  return da.prix_min - db.prix_min;
      if (by === 'prix_desc') return db.prix_min - da.prix_min;
      if (by === 'distance')  return da.distance_paris_km - db.distance_paris_km;
      if (by === 'capacite')  return db.capacite_max - da.capacite_max;
      if (by === 'nom')       return da.nom.localeCompare(db.nom);
      return 0;
    });
  }

  /* ─── Render ──────────────────────────── */
  function renderGrid() {
    const items  = sortItems(applyFilters());
    const grid   = document.getElementById('grid');
    const count  = document.getElementById('results-count');

    count.innerHTML = `<strong>${items.length}</strong> domaine${items.length > 1 ? 's' : ''} trouvé${items.length > 1 ? 's' : ''}`;

    if (items.length === 0) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>Aucun résultat</h3><p>Modifiez vos filtres pour voir plus de domaines.</p></div>`;
      return;
    }

    grid.innerHTML = items.map(({ d, i }) => {
      const isFav = favs.has(i);
      return `
      <div class="card ${isFav ? 'favorited' : ''}" data-idx="${i}">
        <div class="card-top">
          <p class="card-name">${d.nom}</p>
          <p class="card-ville">📍 ${d.ville}</p>
          ${d.note ? `<span class="card-note">★ ${d.note}</span>` : ''}
          <button class="card-fav" data-idx="${i}" title="${isFav ? 'Retirer des favoris' : 'Ajouter aux favoris'}">${isFav ? '⭐' : '☆'}</button>
        </div>
        <div class="card-body">
          <div class="card-kpis">
            <div class="kpi"><span class="kpi-val">${fmtPrice(d.prix_min)}–${fmtPrice(d.prix_max)}</span><span class="kpi-lbl">Budget</span></div>
            <div class="kpi"><span class="kpi-val">${d.capacite_max}</span><span class="kpi-lbl">Invités</span></div>
            <div class="kpi"><span class="kpi-val">${d.distance_paris_km} km</span><span class="kpi-lbl">Paris</span></div>
          </div>
          <div class="card-badges">
            ${d.a_bois_foret   ? '<span class="badge badge-green">🌲 Forêt</span>' : ''}
            ${d.a_hebergement  ? '<span class="badge badge-olive">🏨 Hébergement</span>' : ''}
            ${traiteurBadge(d.traiteur)}
          </div>
          <p class="card-desc">${d.description}</p>
          <div class="card-footer">
            <div class="card-contact">
              ${d.telephone ? `<span>📞 ${d.telephone}</span>` : ''}
              ${d.email     ? `<a href="mailto:${d.email}">${d.email}</a>` : ''}
            </div>
            ${d.site_web ? `<a class="btn-site" href="${d.site_web}" target="_blank" rel="noopener">Site web</a>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');

    /* card click → modal */
    grid.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.closest('.card-fav') || e.target.closest('.btn-site')) return;
        openModal(parseInt(card.dataset.idx));
      });
    });

    /* fav buttons */
    grid.querySelectorAll('.card-fav').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        favs.has(idx) ? favs.delete(idx) : favs.add(idx);
        saveFavs();
      });
    });
  }

  /* ─── Modal ───────────────────────────── */
  function openModal(idx) {
    const d = ALL[idx];
    activeIdx = idx;
    document.getElementById('m-name').textContent  = d.nom;
    document.getElementById('m-ville').textContent = `📍 ${d.ville}`;
    document.getElementById('m-prix').textContent  = `${fmtPrice(d.prix_min)} – ${fmtPrice(d.prix_max)}`;
    document.getElementById('m-cap').textContent   = d.capacite_max + ' pers.';
    document.getElementById('m-dist').textContent  = d.distance_paris_km + ' km';
    document.getElementById('m-note').textContent  = d.note || '—';
    document.getElementById('m-desc').textContent  = d.description;
    document.getElementById('m-link').href         = d.site_web || '#';

    document.getElementById('m-badges').innerHTML = [
      d.a_bois_foret   ? '<span class="badge badge-green">🌲 Forêt / bois</span>' : '<span class="badge badge-gray">Pas de forêt</span>',
      d.a_hebergement  ? '<span class="badge badge-olive">🏨 Hébergement sur place</span>' : '<span class="badge badge-gray">Sans hébergement</span>',
      traiteurBadge(d.traiteur),
    ].join('');

    document.getElementById('m-points').innerHTML = d.points_forts.map(p => `<li>${p}</li>`).join('');

    const contact = [];
    if (d.telephone) contact.push(`<span class="modal-contact-item">📞 ${d.telephone}</span>`);
    if (d.email)     contact.push(`<span class="modal-contact-item">✉ <a href="mailto:${d.email}">${d.email}</a></span>`);
    document.getElementById('m-contact').innerHTML = contact.join('') || '<span class="modal-contact-item" style="color:var(--text-muted)">Pas de contact direct</span>';

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    activeIdx = null;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ─── Event listeners ─────────────────── */
  ['f-search','f-prix-min','f-prix-max','f-dist','f-cap','f-traiteur','f-foret','f-heberg','f-fav-only','sort-by']
    .forEach(id => document.getElementById(id).addEventListener('input', renderGrid));

  document.getElementById('btn-reset').addEventListener('click', () => {
    ['f-search','f-prix-min','f-prix-max','f-dist','f-cap'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-traiteur').value = '';
    ['f-foret','f-heberg','f-fav-only'].forEach(id => document.getElementById(id).checked = false);
    renderGrid();
  });

  /* ─── Load data ───────────────────────── */
  fetch('./domaines.json')
    .then(r => r.json())
    .then(data => {
      ALL = data;
      updateGlobalStats();
      updateFavStrip();
      renderGrid();
    })
    .catch(() => {
      document.getElementById('grid').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><h3>Erreur de chargement</h3><p>Impossible de charger domaines.json</p></div>`;
    });
</script>
</body>
</html>
